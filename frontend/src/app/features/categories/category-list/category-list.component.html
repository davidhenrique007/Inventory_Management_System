<div class="category-list-container">
  <div class="page-header">
    <h1>Categorias</h1>
    <button mat-raised-button color="primary" (click)="navigateToCreate()">
      <mat-icon>add</mat-icon>
      Nova Categoria
    </button>
  </div>

  <div class="filters">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar</mat-label>
      <input matInput [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()" placeholder="Nome da categoria">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="loading-container" *ngIf="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading">
    <div class="empty-state" *ngIf="filteredCategories.length === 0">
      <mat-icon>category</mat-icon>
      <p>Nenhuma categoria encontrada</p>
      <button mat-stroked-button color="primary" (click)="navigateToCreate()">
        Criar primeira categoria
      </button>
    </div>

    <div *ngIf="filteredCategories.length > 0">
      <div class="table-container">
        <table mat-table [dataSource]="filteredCategories" class="mat-elevation-z1">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Nome </th>
            <td mat-cell *matCellDef="let category"> {{ category.name }} </td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Descrição </th>
            <td mat-cell *matCellDef="let category"> {{ category.description || '—' }} </td>
          </ng-container>

          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef> Criado em </th>
            <td mat-cell *matCellDef="let category"> {{ (category.createdAt | date:'dd/MM/yyyy') || '—' }} </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="actions-header"> Ações </th>
            <td mat-cell *matCellDef="let category" class="actions-cell">
              <button mat-icon-button color="primary" (click)="navigateToEdit(category.id)" matTooltip="Editar">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" (click)="deleteCategory(category.id, category.name)" matTooltip="Excluir">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <mat-paginator
        [length]="totalItems"
        [pageSize]="pageSize"
        [pageSizeOptions]="[5, 10, 25, 50]"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </div>
  </div>
</div>
